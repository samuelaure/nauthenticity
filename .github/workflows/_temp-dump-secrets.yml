name: _TEMP secret dump (delete after use)

on:
  workflow_dispatch:

jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - name: Write secrets to server file
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            umask 077
            cat > /tmp/nauthenticity-secrets.env << ENDF
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            APIFY_TOKEN=${{ secrets.APIFY_TOKEN }}
            APIFY_INSTAGRAM_UNIVERSAL_ACTOR_ID=${{ secrets.APIFY_INSTAGRAM_UNIVERSAL_ACTOR_ID }}
            R2_ACCESS_KEY_ID=${{ secrets.R2_ACCESS_KEY_ID }}
            R2_SECRET_ACCESS_KEY=${{ secrets.R2_SECRET_ACCESS_KEY }}
            R2_ENDPOINT=${{ secrets.R2_ENDPOINT }}
            R2_BUCKET_NAME=${{ secrets.R2_BUCKET_NAME }}
            R2_PUBLIC_URL=${{ secrets.R2_PUBLIC_URL }}
            TRANSCRIPTION_URL=${{ secrets.TRANSCRIPTION_URL }}
            ENDF
            chmod 600 /tmp/nauthenticity-secrets.env
