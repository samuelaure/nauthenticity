services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nauthenticity_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nau-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: nauthenticity_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - nau-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  app:
    build: .
    container_name: nauthenticity
    restart: unless-stopped
    environment:
      - PORT=${PORT:-3000}
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - APIFY_TOKEN=${APIFY_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - NAU_SERVICE_KEY=${NAU_SERVICE_KEY}
      - TRANSCRIPTION_URL=${TRANSCRIPTION_URL:-http://whisper:8000}
    volumes:
      - ./storage:/app/storage
    networks:
      - nau-network
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.nauthenticity.rule=Host(`nauthenticity.9nau.com`)'
      - 'traefik.http.routers.nauthenticity.entrypoints=websecure'
      - 'traefik.http.routers.nauthenticity.tls=true'
      - 'traefik.http.routers.nauthenticity.tls.certresolver=letsencrypt'
      - 'traefik.http.services.nauthenticity.loadbalancer.server.port=3000'
      - 'traefik.docker.network=nau-network'

networks:
  nau-network:
    external: true

volumes:
  postgres_data:
