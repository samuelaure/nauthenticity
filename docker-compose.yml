version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nauthenticity_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    networks:
      - nauthenticity_network

  redis:
    image: redis:7-alpine
    container_name: nauthenticity_redis
    restart: always
    ports:
      - '6379:6379'
    networks:
      - nauthenticity_network

  app:
    build: .
    container_name: nauthenticity
    restart: always
    environment:
      - PORT=3000
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    # ports:
    #   - '3000:3000'
    networks:
      - nauthenticity_network

networks:
  nauthenticity_network:
    driver: bridge

volumes:
  postgres_data:
