services:
  postgres:
    image: postgres:16-alpine
    container_name: nauthenticity_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    networks:
      - nauthenticity_network

  redis:
    image: redis:7-alpine
    container_name: nauthenticity_redis
    restart: always
    networks:
      - nauthenticity_network

  app:
    build: .
    container_name: nauthenticity
    restart: always
    environment:
      - PORT=${PORT:-3000}
      - NODE_ENV=${NODE_ENV:-development}
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - APIFY_TOKEN=${APIFY_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TRANSCRIPTION_URL=http://shared_whisper:8000
    volumes:
      - ./storage:/app/storage
    # ports:
    #   - '3000:3000'
    networks:
      - nauthenticity_network
      - shared-mesh
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.nauthenticity.rule=Host(`nauthenticity.localhost`) || Host(`nauthenticity.9nau.com`)'
      - 'traefik.http.routers.nauthenticity.entrypoints=web'
      - 'traefik.http.services.nauthenticity.loadbalancer.server.port=3000'
      - 'traefik.docker.network=shared-mesh'

networks:
  nauthenticity_network:
    driver: bridge
  shared-mesh:
    external: true

volumes:
  postgres_data:
