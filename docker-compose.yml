services:
  nauthenticity_postgres:
    image: pgvector/pgvector:pg16
    container_name: nauthenticity_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nau-network
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    deploy:
      resources:
        limits:
          cpus: '0.35'
          memory: 192M

  nauthenticity_redis:
    image: redis:7-alpine
    container_name: nauthenticity_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - nau-network
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    deploy:
      resources:
        limits:
          cpus: '0.35'
          memory: 192M

  app:
    image: ghcr.io/samuelaure/nauthenticity/app:${TAG:-latest}
    container_name: nauthenticity
    restart: unless-stopped
    environment:
      - PORT=${PORT:-3000}
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@nauthenticity_postgres:5432/${DATABASE_NAME}?schema=public
      - REDIS_HOST=nauthenticity_redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - APIFY_TOKEN=${APIFY_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - NAU_SERVICE_KEY=${NAU_SERVICE_KEY}
      - TRANSCRIPTION_URL=${TRANSCRIPTION_URL:-http://whisper:8000}
    volumes:
      - ./storage:/app/storage
    networks:
      - nau-network
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.nauthenticity.rule=Host(`nauthenticity.9nau.com`)'
      - 'traefik.http.routers.nauthenticity.entrypoints=websecure'
      - 'traefik.http.routers.nauthenticity.tls=true'
      - 'traefik.http.routers.nauthenticity.tls.certresolver=letsencrypt'
      - 'traefik.http.services.nauthenticity.loadbalancer.server.port=3000'
      - 'traefik.docker.network=nau-network'
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    deploy:
      resources:
        limits:
          cpus: '0.7'
          memory: 384M

networks:
  nau-network:
    external: true

volumes:
  postgres_data:
